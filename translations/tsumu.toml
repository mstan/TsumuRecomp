# Card "not formatted?" dialog — table-addressed (never a dispatch arg), so it
# needs the in-place RAM patch (ram_addr). It is INTERACTIVE: the record's
# trailing \r (10-FC prompt/wait) makes the dialog accept Yes/No and advance, so
# the English MUST keep the \r. The structure-preserving patch pads to the
# 102-byte record so the \r + terminator land where the game expects.
# ＄/％ are the game's ○/✕ button glyphs.
[[entry]]
ram_addr = 0x800716D0
src_hex = "b182cc82818382838a835b814a835b816883cd82feff748348835b817d8362836783b382ea82c482feffa282dc82b982f182428130fcfeff748348835b817d8362836783b582dc82b782a9824881feff40814081cd82a28290814081a282a282a682938110fc"
term = "nul"
# Box fits ~11 fullwidth glyphs/line, ~3 lines/page. NO \f: the renderer's page
# break is a press-to-continue that does NOT clear/newline, so text after it
# appends to the current line and spills. Keep everything on 3 lines via \n, with
# the Yes/No on the last line and the trailing \r for the prompt-wait.
en = "Format\nthis card?\n Yes＄ No％\r"

# Overwrite-confirm dialog ("Overwrite? Yes/No") — INTERACTIVE, at the START of
# the 0x71738 blob, ending in \r (10-FC) with the save-location text right after.
# term="none": write the English exactly (52 bytes, ending in \r), NO terminator,
# so the following save-location message is left intact. ＄/％ = ○/✕ buttons.
[[entry]]
ram_addr = 0x80071738
src_hex = "e38f918fab82b582c482feffe682eb82b582a282c582b782a9824881feff40814081cd82a28290814081a282a282a682938110fc"
term = "none"
en = "Overwrite\nthis?\n Yes＄ No％\r"

