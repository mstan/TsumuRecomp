# --- Inter-message NUL separators (packed-chunk structure fix) --------------
# The card-manager messages are packed into NUL-terminated chunks; within a
# chunk, distinct messages (each with its own pointer-table entry at 0x80071a08)
# are separated ONLY by runs of the fullwidth space (0x8140) — no terminator.
# The renderer (msg ptr at gp+0x26c) reads a message until the \r prompt-wait
# (0xFC10) or the 0xFFFF end marker — NOT 0x0000 (drawn as a glyph). So a non-last
# message bleeds through its neighbours to the next \r (the "Reading Card" /
# "Saving. Don't remove Card." status messages rendered the format prompt AND its
# Yes/No \r wait — mangling multiple strings together). Each addr below is the
# start of an inter-message space-run; a 0xFFFF terminator is dropped there so
# every message ends cleanly (no input-wait). Verify-then-patch in the runtime
# only ever overwrites a resident fullwidth space, never text.
[[msg_sep]]   # 0x71648 chunk: Reading Card | Data unusable | Saving | FORMAT prompt
addr = 0x80071666
[[msg_sep]]
addr = 0x8007168C
[[msg_sep]]
addr = 0x800716C4
[[msg_sep]]   # 0x715dc chunk: additional card status/error messages
addr = 0x800715E8
[[msg_sep]]
addr = 0x8007160A
[[msg_sep]]
addr = 0x80071628
[[msg_sep]]   # 0x71818 chunk: additional card status/error messages
addr = 0x8007183A
[[msg_sep]]
addr = 0x8007185C
[[msg_sep]]
addr = 0x80071882
[[msg_sep]]
addr = 0x800718F2

