[game]
name = "Tsumu Light"
id = "SLPS-02253"
exe = "tsumu/SLPS_022.53"
disc = "tsumu/Tsumu Light (Japan).cue"
load_address = "0x80010000"
entry_pc = "0x800691F0"
text_size = "0x00080000"
stack_base = "0x801FFFF0"

[recompiler]
seeds = "seeds/ghidra_funcs.txt"
out_dir = "generated"
strict = true

[runtime]
debug_port = 4510
window_title = "Tsumu Light Recompiled"
# Present a DualShock so the DualSense/gamepad + keyboard reliably handshake and
# deliver input (the plain digital-pad path wasn't delivering input to the game).
# Tsumu is a digital game and just reads the digital buttons off the pad.
controller = "dualshock"
memcard_dir = "saves"

[controller]
default_mode = "digital"   # DualShock present, but default to digital pad reporting (Tsumu is a digital game)
lock_mode    = true        # single pad type; no launcher selector

# ── Audit-specific config (consumed by psxrecomp/tools/*.py and tests) ──
# Schema mirrors psxrecomp/bios/SCPH1001.toml. Paths are relative to the
# project root.

[audit]
# Dynamic discovery — functions are found by walking control flow from
# entry_pc. No Ghidra function-starts file is required to bootstrap.

# Code region: text segment is contiguous from load_address for text_size bytes.
[[audit.regions]]
name        = "Text"
rom_start   = "0x800"          # offset within the PS-X EXE file (skip header)
rom_end     = "0x80800"        # rom_start + text_size
vaddr_base  = "0x80010000"

# Address normalization: KSEG masking only (game loads contiguously, no remaps).
[audit.normalize]
kseg_mask = "0x1FFFFFFF"
